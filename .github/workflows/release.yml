name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci
        working-directory: app

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'IO 設備通訊對照表 ${{ github.ref_name }}'
          releaseBody: |
            ## 更新內容
            請參閱 [CHANGELOG](https://github.com/wkltueserc20/IO_lIST/commits/main) 了解詳細變更。

            ## 安裝說明
            - **Windows**：下載 `.msi` 或 `.exe` 安裝檔
            - **macOS (Apple Silicon)**：下載 `aarch64.dmg`
            - **macOS (Intel)**：下載 `x86_64.dmg`
            - **Linux**：下載 `.AppImage` 或 `.deb`
          releaseDraft: true
          prerelease: false
          projectPath: '.'
          tauriScript: npm run build
