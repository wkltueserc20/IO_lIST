name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install root dependencies
        run: npm install

      - name: Install frontend dependencies
        run: npm ci
        working-directory: app

      - name: Build frontend
        run: npm run build
        working-directory: app

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'IO 設備通訊對照表 ${{ github.ref_name }}'
          releaseBody: |
            ## 更新內容

            ### v0.1.3
            - **新增 PLC 即時監控**：設備清單 📡 按鈕，即時讀取 KEYENCE / 三菱 PLC IO 點位值
              - KEYENCE KV Upper-Link Protocol（KV-XLE02 / KV-EP21 / 內建乙太網路）
              - 三菱 SLMP / MC Protocol 3E Frame（QnU / iQ-R / iQ-F）Binary & ASCII
              - 支援資料類型：BOOL、INT、UINT/WORD、DWORD/UDINT、DINT、FLOAT
            - **修正 INT 資料類型**：正確顯示有符號 16 位元（-32768 ~ 32767）
            - **修正拖曳排序**：改用 Pointer Events，解決 Tauri 桌面版無法拖曳的問題

            ### v0.1.2
            - 修正 X 按鈕關閉視窗行為（有未儲存變更時跳出確認對話框）

            ### v0.1.1
            - 修正若干建置與打包問題

            ### v0.1.0
            - 全域搜尋（`Ctrl+F`）、Excel 匯入、狀態列、右鍵選單、衝突徽章
            - 主系統視角（反向 IO 對照表）
            - 類 Excel 複製貼上、拖曳填充、自然排序

            請參閱 [提交記錄](https://github.com/wkltueserc20/IO_lIST/commits/main) 了解完整變更。

            ---

            ## 安裝說明

            1. 下載下方 **Assets** 中的 `IO 設備通訊對照表_*_x64-setup.exe`
            2. 雙擊執行安裝檔，依照精靈步驟完成安裝
            3. 安裝完成後可從桌面或開始選單啟動

            > **⚠️ Windows SmartScreen 警告**
            > 首次執行安裝檔時，Windows 可能出現「已保護您的電腦」的提示。
            > 這是因為應用程式尚未取得 Microsoft 的程式碼簽署憑證，並非病毒或惡意程式。
            >
            > 略過方式：點擊「**更多資訊**」→ 點擊「**仍要執行**」即可繼續安裝。

            ---

            ## PLC 監控設定

            1. 在左側設備清單選擇設備，於右側編輯面板填入 **IP 位址**、**Port**、**PLC 品牌**
            2. 確認 PLC 已啟用乙太網路通訊且可從此電腦連線
            3. 點擊設備清單旁的 **📡** 按鈕開始監控，IO 表格將即時顯示各點位的值

            | PLC 品牌 | 預設 Port | 協定 |
            |---------|----------|------|
            | KEYENCE | 8501 | KV Upper-Link（ASCII over TCP） |
            | 三菱 | 502 | SLMP / MC Protocol 3E Frame |

            ---

            ## 基本操作

            | 功能 | 操作方式 |
            |------|----------|
            | 新增專案 | 工具列「新增」或 `Ctrl+N` |
            | 開啟檔案 | 工具列「開啟」或 `Ctrl+O`，支援雙擊 `.json` 直接開啟 |
            | 儲存 | `Ctrl+S` |
            | 另存新檔 | `Ctrl+Shift+S` |
            | 匯出 Excel | 工具列「匯出 Excel」 |
            | 復原 / 重做 | `Ctrl+Z` / `Ctrl+Y` |
            | 全域搜尋 | `Ctrl+F` |
            | 新增設備 | 左側側欄底部「+ 新增設備」 |
            | 切換視角 | 工具列右側「設備視角 ↔ 主系統視角」 |

            ---

            ## 系統需求

            - **作業系統**：Windows 10 / 11（64 位元）
            - **WebView2**：Windows 11 內建，Windows 10 需安裝（通常已隨 Edge 自動安裝）
            - **硬碟空間**：約 10 MB
          releaseDraft: true
          prerelease: false
          projectPath: '.'
          args: '--bundles nsis'
